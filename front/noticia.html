<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noticia - OSPPyFER</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="site-header">
      <div class="container" style="padding: 20px 0">
        <a
          href="index.html"
          class="btn"
          style="
            text-decoration: none;
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
          "
        >
          <i class="fas fa-arrow-left"></i> Volver al Inicio
        </a>
      </div>
    </header>

    <main class="container">
      <section class="section">
        <div id="noticia-contenido">
          <p style="text-align: center">Cargando noticia...</p>
        </div>
      </section>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        // USAR LA MISMA URL QUE EN SCRIPT.JS
        const API_BASE_URL = "http://localhost:8000";

        // 1. Obtener el ID de la noticia desde la URL (?id=2)
        const urlParams = new URLSearchParams(window.location.search);
        const noticiaId = urlParams.get("id");

        const container = document.getElementById("noticia-contenido");

        if (!noticiaId) {
          container.innerHTML =
            "<h2>Error: ID de noticia no proporcionado.</h2>";
          return;
        }

        try {
          // 2. Llamar a la API
          const response = await fetch(
            `${API_BASE_URL}/api/news/${noticiaId}`,
            {
              headers: { Accept: "application/json" },
            },
          );

          if (!response.ok) {
            throw new Error("No se encontró la noticia");
          }

          const n = await response.json();

          // 3. Renderizar la noticia
          const imgPath = n.image
            ? `${API_BASE_URL}/storage/${n.image}`
            : "https://images.unsplash.com/photo-1509440159596-0249088772ff?w=800";

          container.innerHTML = `
                    <article class="noticia-completa">
                        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">${n.title}</h1>
                        <p style="color: #666; font-style: italic;">
                            <i class="fas fa-calendar-alt"></i> Publicado el: ${new Date(n.created_at).toLocaleDateString()}
                        </p>
                        <hr style="margin: 20px 0; opacity: 0.2;">
                        <img src="${imgPath}" alt="${n.title}" style="width: 100%; max-height: 500px; object-fit: cover; border-radius: 15px; margin-bottom: 30px;">
                        <div class="noticia-texto" style="font-size: 1.2rem; line-height: 1.8; color: #333;">
                            ${n.content}
                        </div>
                    </article>
                `;
        } catch (error) {
          console.error(error);
          container.innerHTML = `
                    <div style="text-align: center; padding: 50px;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #e74c3c;"></i>
                        <h2 style="margin-top: 20px;">La noticia no existe o fue eliminada.</h2>
                        <a href="index.html" class="btn">Regresar al inicio</a>
                    </div>
                `;
        }
      });
    </script>
  </body>
</html>
